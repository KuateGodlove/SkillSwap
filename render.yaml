services:
  - type: web
    name: skillswapp-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        fromConfigVar: mongodb_uri
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://skillswapp-marketplace.vercel.app